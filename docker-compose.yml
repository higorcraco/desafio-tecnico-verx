services:
  postgres:
    image: postgres:16-alpine
    container_name: verx-task-api-postgres
    profiles:
      - dev
    environment:
      POSTGRES_DB: ${DB_NAME:-task_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verx_user"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
